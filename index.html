<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>shelfed — Rescue Prototype</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,600;0,700;1,500;1,600&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet"/>
<style>
@font-face { font-family: 'Open Runde'; font-weight: 400; src: url('https://cdn.jsdelivr.net/gh/lauridskern/open-runde@main/fonts/OpenRunde-Regular.woff2') format('woff2'); font-display: swap; }
@font-face { font-family: 'Open Runde'; font-weight: 500; src: url('https://cdn.jsdelivr.net/gh/lauridskern/open-runde@main/fonts/OpenRunde-Medium.woff2') format('woff2'); font-display: swap; }
@font-face { font-family: 'Open Runde'; font-weight: 600; src: url('https://cdn.jsdelivr.net/gh/lauridskern/open-runde@main/fonts/OpenRunde-Semibold.woff2') format('woff2'); font-display: swap; }
@font-face { font-family: 'Open Runde'; font-weight: 700; src: url('https://cdn.jsdelivr.net/gh/lauridskern/open-runde@main/fonts/OpenRunde-Bold.woff2') format('woff2'); font-display: swap; }

html, body { margin: 0; padding: 0; background: #1a1a1a; min-height: 100vh; font-family: 'Open Runde', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
button { font-family: inherit; outline: none; }
::-webkit-scrollbar { width: 0; background: transparent; }
.no-scroll::-webkit-scrollbar { display: none; }

.blink-dot { animation: blink 1s steps(2,start) infinite; }
@keyframes blink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0.3; } }
.pulse { animation: pulseBg 1.4s ease infinite; }
@keyframes pulseBg { 0%,100% { box-shadow: 0 0 0 0 rgba(232,23,10,0.5); } 50% { box-shadow: 0 0 0 6px rgba(232,23,10,0); } }
.pulse-bg { animation: pulseRedBg 1s ease infinite; }
@keyframes pulseRedBg { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }
.pulse-btn { animation: pulseBtn 0.6s ease infinite; }
@keyframes pulseBtn { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
.cart-bar { animation: cartIn 0.35s ease; }
@keyframes cartIn { from { transform: translateY(80px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.screen-anim { animation: screenIn 0.3s ease; height: 100%; }
@keyframes screenIn { from { opacity: 0; transform: translateX(8px); } to { opacity: 1; transform: translateX(0); } }
.splash-mark { animation: splashMark 0.5s cubic-bezier(0.2,0.7,0.3,1.4) backwards; }
@keyframes splashMark { from { opacity: 0; transform: scale(0.5); } }
.splash-word { animation: fadeUp 0.4s ease 0.3s backwards; }
.splash-tag { animation: fadeUp 0.35s ease 0.55s backwards; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.check-bg { animation: checkBg 0.4s cubic-bezier(0.2,0.7,0.3,1.4) backwards; }
@keyframes checkBg { from { transform: scale(0); transform-origin: center; } }
.check-mark { animation: drawCheck 0.4s ease-out 0.4s forwards; transform-origin: center; }
@keyframes drawCheck { to { stroke-dashoffset: 0; } }
.confetti { border-radius: 50%; opacity: 0; animation: confetti 0.7s ease-out forwards; }
@keyframes confetti { 0% { opacity: 1; transform: translate(-50%,-50%) translate(0,0) scale(1); } 100% { opacity: 0; transform: translate(-50%,-50%) translate(var(--tx), var(--ty)) scale(0); } }
.fade-up { opacity: 0; animation: fadeUp 0.3s ease forwards; }
.slide-up { opacity: 0; animation: slideUp 0.4s cubic-bezier(0.2,0.7,0.3,1.2) forwards; }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.delay1 { animation-delay: 0.5s; } .delay2 { animation-delay: 0.7s; } .delay3 { animation-delay: 0.9s; }
.delay4 { animation-delay: 1.1s; } .delay5 { animation-delay: 1.3s; }
.xp-fill { animation: xpFill 0.8s ease-out; }
@keyframes xpFill { from { width: 0 !important; } }
.ping { animation: ping 1.5s ease-in-out infinite; }
@keyframes ping { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(2.5); opacity: 0; } }
.counter { animation: countPulse 2s ease infinite; display: inline-block; }
@keyframes countPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
.waste-banner { animation: bannerIn 0.5s cubic-bezier(0.2,0.7,0.3,1.2); }
@keyframes bannerIn { from { opacity: 0; transform: translateY(10px); } }
@keyframes giftShake { from { transform: rotate(-8deg) scale(1.1); } to { transform: rotate(8deg) scale(1.1); } }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="theme.jsx"></script>
<script type="text/babel" src="screens-onboarding.jsx"></script>
<script type="text/babel" src="screens-home.jsx"></script>
<script type="text/babel" src="screens-store.jsx"></script>
<script type="text/babel" src="screens-flow.jsx"></script>
<script type="text/babel" src="screens-gift.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
